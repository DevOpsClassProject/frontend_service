services:
  ecommerce-frontend:
    image: ${REGISTRY_USER}/${IMAGE_NAME}:${BUILD_NUMBER}
    container_name: ecommerce-frontend-container
    ports:
      - "3000:80"
    networks:
      - ecommerce-net
    depends_on:
      - ecommerce-product
      - ecommerce-order

networks:
  ecommerce-net:
    name: ecommerce-net
    driver: bridge

# Define the database as an external service
services:
  ecommerce-product:
    external: true
  ecommerce-order:
    external: true